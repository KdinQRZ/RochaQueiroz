            type="password"

<div id="lista"></div>

Sair

<script>

const SENHA = "Naosei00";

function entrar(){

    const senha =
        document.getElementById("senha").value;

    if(senha === SENHA){

        localStorage.setItem(
            "casaflow_logado",
            "sim"
        );

        mostrarSistema();

    }else{

        document.getElementById("erro")
            .innerHTML = "Senha incorreta";

    }
}

function sair(){

    localStorage.removeItem(
        "casaflow_logado"
    );

    location.reload();
}

function mostrarSistema(){

    document.getElementById("loginTela")
        .style.display = "none";

    document.getElementById("app")
        .style.display = "block";
}

if(
    localStorage.getItem(
        "casaflow_logado"
    ) === "sim"
){
    mostrarSistema();
}

</script>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
 getFirestore,
 collection,
 addDoc,
 getDocs
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {

 authDomain:

 messagingSenderId:
 "961447711850",

 appId:
 "1:961447711850:web:c5b5e9e64cc83fc107e613"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.adicionarCompra = async function(){

 const descricao =
  document.getElementById("descricao").value;

 const valor =
  parseFloat(
   document.getElementById("valor").value
  );

 await addDoc(
  collection(db,"compras"),
  {
   descricao,
   valor
  }
 );

 carregarCompras();
}

async function carregarCompras(){

 const snapshot =
  await getDocs(
   collection(db,"compras")
  );

 const lista =
  document.getElementById("lista");

 lista.innerHTML = "";

 snapshot.forEach(doc=>{

  const c = doc.data();

  lista.innerHTML += `
   <div>
    ${c.descricao}
    - R$ ${c.valor}
   </div>
  `;

 });

}

window.onload = carregarCompras;

</script>
